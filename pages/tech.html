<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deep Tech | Lopes</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: radial-gradient(circle at top, #1a0a2f 0%, #020202 100%);
            color: #fff; 
            font-family: 'Orbitron', sans-serif; 
            overflow-x: hidden; 
            line-height: 1.6; 
            min-height: 100vh;
        }
        
        .bg-grid { 
            position: fixed; 
            top: 0; width: 100%; height: 100%; 
            background: 
                linear-gradient(rgba(255,0,255,0.05) 1px, transparent 1px), 
                linear-gradient(90deg, rgba(255,0,255,0.05) 1px, transparent 1px); 
            background-size: 30px 30px; 
            z-index: -1; 
        }
        
        .wrapper { max-width: 800px; margin: 0 auto; padding: 60px 20px; position: relative; z-index: 1; }
        
        .header-tech { border-left: 5px solid #00f2ff; padding-left: 20px; margin-bottom: 30px; box-shadow: -10px 0 20px rgba(0, 242, 255, 0.2); }
        .header-tech h1 { font-size: 2.5rem; text-transform: uppercase; color: #fff; text-shadow: 0 0 15px #00f2ff; }
        
        .profile-area { text-align: center; margin-bottom: 60px; position: relative; }
        .profile-img { 
            width: 120px; 
            height: 120px; 
            border-radius: 50%; 
            border: 2px solid #00f2ff; 
            object-fit: cover; 
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.5);
            filter: brightness(0.9) contrast(1.1); 
        }

        .section-card { 
            background: rgba(255,255,255,0.03); 
            border: 1px solid rgba(0,242,255,0.2); 
            padding: 30px; 
            margin-bottom: 40px; 
            border-radius: 4px; 
            backdrop-filter: blur(5px); 
            transition: 0.3s;
        }
        
        .section-card h2 { color: #00f2ff; font-size: 1.2rem; margin-bottom: 20px; text-transform: uppercase; display: flex; align-items: center; text-shadow: 0 0 10px #00f2ff; }
        .section-card h2::before { content: ">"; margin-right: 10px; color: #ff00ff; text-shadow: 0 0 10px #ff00ff; }
        
        .tech-text { font-family: 'Courier New', Courier, monospace; color: #fff; font-size: 1rem; text-align: justify; }
        .highlight { color: #ff00ff; font-weight: bold; text-shadow: 0 0 5px #ff00ff; }

        .site-models { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 20px; }
        @media (min-width: 600px) { .site-models { grid-template-columns: 1fr 1fr; } }
        
        .model { padding: 15px; border-left: 2px solid #ff00ff; background: rgba(255,0,255,0.05); transition: 0.3s; }
        .model:hover { background: rgba(255,0,255,0.15); transform: translateX(5px); }

        /* --- SEÇÃO DE PROJETOS --- */
        .tech-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 20px; 
            margin-top: 20px; 
        }

        .tech-project-card {
            position: relative;
            border: 1px solid rgba(255, 0, 255, 0.3);
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 16 / 9;
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tech-project-card.reveal { opacity: 1; transform: translateY(0); }

        .tech-project-card img {
            width: 100%; height: 100%;
            object-fit: cover;
            filter: grayscale(0.6);
            transition: 0.5s;
        }

        .tech-project-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: 0.3s;
        }

        .tech-project-card:hover img { filter: grayscale(0); transform: scale(1.1); }
        .tech-project-card:hover .tech-project-overlay { opacity: 1; }
        .tech-project-card:hover { border-color: #00f2ff; box-shadow: 0 0 20px rgba(0, 242, 255, 0.3); }

        .btn-tech-view {
            padding: 10px 20px;
            border: 1px solid #00f2ff;
            background: transparent;
            color: #00f2ff;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            cursor: pointer;
        }

        .footer-nav { text-align: center; margin-top: 50px; padding-bottom: 50px; }
        
        .btn-back { 
            display: inline-block;
            color: #ff00ff; 
            text-decoration: none; 
            border: 2px solid #ff00ff; 
            padding: 15px 30px; 
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s; 
            background: rgba(255, 0, 255, 0.05);
            cursor: pointer;
        }
        .btn-back:hover { background: #ff00ff; color: #000; box-shadow: 0 0 40px #ff00ff; }

        #transition-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 0.5s;
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div id="transition-overlay"></div>

    <div class="wrapper">
        <header class="header-tech">
            <p style="font-size: 10px; color: #ff00ff; letter-spacing: 3px;">STATUS: ONLINE</p>
            <h1>Soluções Digitais</h1>
        </header>

        <div class="profile-area">
            <img src="IMG_20250207_003738.jpg" alt="Ivo Lopes" class="profile-img">
        </div>

        <div class="section-card">
            <h2>Engenharia de Performance</h2>
            <div class="tech-text">
                Desenvolvo sites focados em <span class="highlight">conversão real</span>. Uso HTML5, CSS3 e JavaScript puro para garantir que seu projeto seja rápido e eficiente.
            </div>
        </div>

        <div class="section-card">
            <h2>Projetos Desenvolvidos</h2>
            <div class="tech-grid">
                <div class="tech-project-card">
                    <img src="89ad273cfcabdeba8901292427310d93.jpg">
                    <div class="tech-project-overlay"><button class="btn-tech-view">DETALHES</button></div>
                </div>
                <div class="tech-project-card">
                    <img src="IMG_20260419_234142.jpg">
                    <div class="tech-project-overlay"><button class="btn-tech-view">DETALHES</button></div>
                </div>
                <div class="tech-project-card">
                    <img src="c2ebb795411eab761d324593fbcae3d3.jpg">
                    <div class="tech-project-overlay"><button class="btn-tech-view">DETALHES</button></div>
                </div>
            </div>
        </div>

        <footer class="footer-nav">
            <a onclick="voltarMenu()" class="btn-back">RETORNAR AO HUB CENTRAL</a>
        </footer>
    </div>

    <script>
        function voltarMenu() {
            const overlay = document.getElementById('transition-overlay');
            overlay.style.opacity = '1';
            overlay.style.pointerEvents = 'all';
            setTimeout(() => { window.location.href = "../index.html"; }, 500);
        }

        // Sistema de revelação na rolagem
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('reveal');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.tech-project-card').forEach(card => {
            observer.observe(card);
        });

        window.onpageshow = () => {
            document.getElementById('transition-overlay').style.opacity = '0';
        };
    </script>
</body>
</html>
