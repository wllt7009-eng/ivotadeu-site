<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lopes | Tech Vision</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            /* AJUSTE: Fundo escurecido para não cansar os olhos */
            background-color: #050505; 
            color: #ffffff;
            font-family: 'Orbitron', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Linhas tecnológicas de fundo (O Sal do site) */
        .grid {
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
            transform: perspective(500px) rotateX(60deg);
            top: -50%;
            animation: move 10s linear infinite;
            z-index: 0;
        }

        @keyframes move {
            from { transform: perspective(500px) rotateX(60deg) translateY(0); }
            to { transform: perspective(500px) rotateX(60deg) translateY(40px); }
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 20px;
        }

        /* A Caveira Hacker (Mantenha o visual) */
        .hacker-art {
            color: #00f2ff;
            font-family: monospace;
            font-size: 10px;
            white-space: pre;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #00f2ff;
        }

        .name {
            font-size: 12px;
            letter-spacing: 5px;
            color: #00f2ff;
            margin-bottom: 15px;
            opacity: 0.8;
        }

        /* Título com Gradiente FODA (Mantenha o visual) */
        h1 {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 40px;
            background: linear-gradient(90deg, #00f2ff 0%, #ff00ff 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 242, 255, 0.5);
            line-height: 1;
        }

        /* Botões com efeito de Neon (Mantenha o visual) */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .btn {
            width: 280px;
            padding: 18px;
            background: transparent;
            border: 2px solid #00f2ff;
            color: #00f2ff;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            text-transform: uppercase;
            text-decoration: none;
            letter-spacing: 2px;
            transition: 0.3s;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.2);
        }

        .btn:hover {
            background: #00f2ff;
            color: #000;
            box-shadow: 0 0 40px #00f2ff;
        }

        /* Efeito de Portal ao clicar */
        .portal {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: #00f2ff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 9999;
            pointer-events: none;
            transition: width 0.8s ease-in, height 0.8s ease-in;
        }
    </style>
</head>
<body>

    <div class="grid"></div>
    <div class="portal" id="portal"></div>

    <div class="container">
        <div class="hacker-art">
     _  _
    ( \/ )
     \  /
      \/
   LOPES.DEV
        </div>

        <p class="name">IVO TADEU ALMEIDA LOPES</p>
        <h1>CONSTRUINDO <br> O FUTURO</h1>

        <div class="btn-group">
            <button class="btn" onclick="transicao('whats')">Quero um Site</button>
            <button class="btn" onclick="transicao('tech')">Sistema Tech</button>
        </div>
    </div>

    <script>
        function transicao(destino) {
            const p = document.getElementById('portal');
            p.style.width = '300vw';
            p.style.height = '300vw';
            
            setTimeout(() => {
                if(destino === 'whats') {
                    window.location.href = "https://wa.me/5538997404945?text=oi%20quero%20um%20site";
                } else {
                    window.location.href = "pages/tech.html";
                }
            }, 800);
        }
    </script>
</body>
</html>
