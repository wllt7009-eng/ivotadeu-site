<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lopes | Tech Vision</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        /* FORÇANDO O FUNDO PRETO LOGO NO INÍCIO */
        html, body {
            background-color: #000 !important;
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body { 
            color: #ffffff; 
            font-family: 'Orbitron', sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            position: fixed; 
        }
        
        /* GRID COM COR AJUSTADA PARA BRILHAR NO PRETO */
        .grid { 
            position: absolute; 
            width: 200%; 
            height: 200%; 
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.15) 1px, transparent 1px), 
                linear-gradient(90deg, rgba(0, 242, 255, 0.15) 1px, transparent 1px); 
            background-size: 40px 40px; 
            transform: perspective(500px) rotateX(60deg); 
            top: -50%; 
            animation: moveGrid 10s linear infinite; 
            z-index: 0; 
        }
        @keyframes moveGrid { from { transform: perspective(500px) rotateX(60deg) translateY(0); } to { transform: perspective(500px) rotateX(60deg) translateY(40px); } }

        .container { position: relative; z-index: 10; text-align: center; padding: 20px; width: 100%; }
        
        .hacker-art { 
            color: #00f2ff; 
            font-family: monospace; 
            font-size: 10px; 
            white-space: pre; 
            margin-bottom: 20px; 
            text-shadow: 0 0 10px #00f2ff;
        }
        
        .name { font-size: 10px; letter-spacing: 5px; color: #ff00ff; margin-bottom: 15px; text-shadow: 0 0 5px #ff00ff; }
        
        h1 { 
            font-size: 2.2rem; 
            font-weight: 900; 
            margin-bottom: 40px; 
            background: linear-gradient(90deg, #00f2ff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.1; 
        }
        
        .btn-group { display: flex; flex-direction: column; gap: 20px; align-items: center; }
        
        .btn { 
            width: 85%; 
            max-width: 300px; 
            padding: 18px; 
            background: rgba(0, 0, 0, 0.8); 
            border: 2px solid #00f2ff; 
            color: #00f2ff; 
            font-family: 'Orbitron', sans-serif; 
            font-weight: 900; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            transition: 0.3s; 
            cursor: pointer; 
        }
        
        .btn:active { background: #00f2ff; color: #000; transform: scale(0.95); }

        /* ELEMENTOS DE FUNDO (MARIO KART / TECH) */
        .background-elements {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        
        .b-element {
            position: absolute;
            font-size: 24px;
            opacity: 0;
            animation: floatElement 12s linear infinite;
        }

        @keyframes floatElement {
            0% { transform: translate(var(--sx), var(--sy)) rotate(0deg); opacity: 0; }
            20% { opacity: 0.4; }
            80% { opacity: 0.4; }
            100% { transform: translate(var(--ex), var(--ey)) rotate(360deg); opacity: 0; }
        }

        /* OVERLAY DE TRANSIÇÃO */
        #transition-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 0.5s;
        }
    </style>
</head>
<body oncontextmenu="return false;">
    <div class="grid"></div>
    <div id="transition-overlay"></div>
    <div class="background-elements" id="bg-elements"></div>

    <div class="container">
        <div class="hacker-art">
    _  _ 
   ( \/ )
    \  / 
     \/  
  TECH_LEAD
        </div>
        <p class="name">IVO TADEU ALMEIDA LOPES</p>
        <h1>CONSTRUINDO <br> O FUTURO</h1>
        <div class="btn-group">
            <button class="btn" onclick="navegar('whats')">Quero um Site</button>
            <button class="btn" onclick="navegar('tech')">Sistema Tech</button>
        </div>
    </div>

    <script>
        // Função de navegação com o fade preto
        function navegar(destino) {
            const overlay = document.getElementById('transition-overlay');
            overlay.style.opacity = '1';
            overlay.style.pointerEvents = 'all';
            
            setTimeout(() => {
                if(destino === 'whats') {
                    window.location.href = "https://wa.me/5538997404945?text=oi%20quero%20um%20site";
                } else {
                    window.location.href = "pages/tech.html";
                }
            }, 500);
        }

        // Criando os itens de fundo
        const icons = ['🏎️', '🍄', '🍌', '⭐', '🐢', '🛸', '👾', '🚀', '⚡', '💻'];
        const container = document.getElementById('bg-elements');

        for (let i = 0; i < 15; i++) {
            const el = document.createElement('div');
            el.className = 'b-element';
            el.innerText = icons[Math.floor(Math.random() * icons.length)];
            
            // Posições aleatórias
            el.style.setProperty('--sx', Math.random() * 100 + 'vw');
            el.style.setProperty('--sy', Math.random() * 100 + 'vh');
            el.style.setProperty('--ex', Math.random() * 100 + 'vw');
            el.style.setProperty('--ey', Math.random() * 100 + 'vh');
            
            el.style.animationDelay = Math.random() * 10 + 's';
            el.style.left = "0";
            el.style.top = "0";
            
            container.appendChild(el);
        }

        // Corrige o bug do branco ao voltar
        window.onpageshow = function(event) {
            const overlay = document.getElementById('transition-overlay');
            overlay.style.opacity = '0';
            overlay.style.pointerEvents = 'none';
        };
    </script>
</body>
</html>
