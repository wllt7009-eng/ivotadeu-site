<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lopes Digital Co. | Tech Vision</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        /* FUNDO PRETO TOTAL */
        html, body {
            background-color: #000 !important;
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body { 
            color: #ffffff; 
            font-family: 'Orbitron', sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            position: fixed; 
        }
        
        /* GRADE COM PROFUNDIDADE (STYLE TRON) */
        .grid { 
            position: absolute; 
            width: 400%; 
            height: 400%; 
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.2) 1px, transparent 1px), 
                linear-gradient(90deg, rgba(0, 242, 255, 0.2) 1px, transparent 1px); 
            background-size: 60px 60px; 
            transform: perspective(500px) rotateX(75deg); 
            top: -120%; 
            animation: moveGrid 12s linear infinite; 
            z-index: 0;
            mask-image: linear-gradient(to top, rgba(0,0,0,1) 15%, rgba(0,0,0,0) 70%);
            -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,1) 15%, rgba(0,0,0,0) 70%);
        }

        @keyframes moveGrid { 
            from { transform: perspective(500px) rotateX(75deg) translateY(0); } 
            to { transform: perspective(500px) rotateX(75deg) translateY(60px); } 
        }

        /* CONTEÚDO AJUSTADO PARA CIMA */
        .container { 
            position: relative; 
            z-index: 10; 
            text-align: center; 
            padding: 20px; 
            width: 100%; 
            margin-top: -80px; /* PUXA TUDO PARA CIMA */
        }

            color: #00f2ff; 
            font-family: monospace; 
            font-size: 10px; 
            white-space: pre; 
            margin-bottom: 20px; 
            text-shadow: 0 0 10px #00f2ff;
        }
        
        .name { 
            font-size: 14px; 
            letter-spacing: 6px; 
            color: #ff00ff; 
            margin-bottom: 10px; 
            text-shadow: 0 0 8px #ff00ff; 
            font-weight: 900;
            text-transform: uppercase;
        }

            font-size: 2.2rem; 
            font-weight: 900;

            background: linear-gradient(90deg, #00f2ff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.1; 
        }
