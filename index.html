<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lopes Digital Co. | Tech Vision</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        html, body {
            background-color: #000 !important;
            margin: 0; padding: 0;
            width: 100vw;
            min-height: 100vh;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body { 
            color: #ffffff; 
            font-family: 'Orbitron', sans-serif; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: flex-start;
        }
        
        /* GRADE ANIMADA */
        .grid { 
            position: fixed; 
            width: 400%; height: 200vh; 
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.15) 1px, transparent 1px), 
                linear-gradient(90deg, rgba(0, 242, 255, 0.15) 1px, transparent 1px); 
            background-size: 60px 60px; 
            transform: perspective(500px) rotateX(75deg); 
            top: -50%; 
            animation: moveGrid 15s linear infinite; 
            z-index: 1;
            mask-image: linear-gradient(to top, rgba(0,0,0,1) 30%, rgba(0,0,0,0) 80%);
            pointer-events: none;
        }

        @keyframes moveGrid { 
            from { transform: perspective(500px) rotateX(75deg) translateY(0); } 
            to { transform: perspective(500px) rotateX(75deg) translateY(60px); } 
        }

        /* ANIMAÇÕES DE FUNDO (ÍCONES) */
        .background-elements { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2; }
        .b-element { position: absolute; font-size: 24px; opacity: 0; animation: floatElement 15s linear infinite; }

        @keyframes floatElement {
            0% { transform: translate(var(--sx), var(--sy)) rotate(0deg); opacity: 0; }
            20% { opacity: 0.3; }
            80% { opacity: 0.3; }
            100% { transform: translate(var(--ex), var(--ey)) rotate(360deg); opacity: 0; }
        }

        .container { 
            position: relative; 
            z-index: 10; 
            text-align: center; 
            padding: 8vh 20px 60px; 
            width: 100%; 
        }
        
        .diamond-img { width: 60px; height: auto; filter: drop-shadow(0 0 10px #00f2ff); margin-bottom: 20px; }
        .name { font-size: 14px; letter-spacing: 6px; margin-bottom: 10px; text-shadow: 0 0 8px #00f2ff; font-weight: 900; text-transform: uppercase; }
        h1 { font-size: 2.2rem; font-weight: 900; margin-bottom: 40px; background: linear-gradient(90deg, #00f2ff, #ff00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .btn-group { display: flex; flex-direction: column; gap: 20px; align-items: center; width: 100%; }
        
        .btn { 
            width: 85%; max-width: 300px; padding: 18px; 
            background: rgba(0, 0, 0, 0.85); border: 2px solid #00f2ff; 
            color: #00f2ff; font-family: 'Orbitron', sans-serif; font-weight: 900; 
            text-transform: uppercase; letter-spacing: 2px; cursor: pointer;
            transition: 0.3s;
            animation: pulseGlow 3s infinite;
        }
        
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 5px rgba(0, 242, 255, 0.2); }
            50% { box-shadow: 0 0 15px rgba(0, 242, 255, 0.5); border-color: #ffffff; }
        }

        .btn:active { transform: scale(0.95); background: #00f2ff; color: #000; }

        /* BAÚ CORRIGIDO */
        .price-box-container {
            margin-top: 20px;
            position: relative;
            min-height: 100px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
        }

        .exploding-box {
            width: 18px; height: 18px; 
            background-image: url('d13f5683bc7fe962cdcd0bd925ac50aa.jpg'); 
            background-size: cover;
            box-shadow: 0 0 20px #00f2ff;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: absolute;
        }

        .exploding-box.active { transform: scale(6); opacity: 0; filter: blur(4px); }

        .price-content {
            opacity: 0; transform: scale(0.8); transition: 0.5s;
            color: #00f2ff; font-size: 0.80rem; font-weight: 900;
            text-align: center; text-transform: uppercase; line-height: 1.6;
        }

        .price-content.show { opacity: 1; transform: scale(1); }

        /* CONTEÚDO E FORMULÁRIO */
        .section-wrapper { position: relative; z-index: 20; width: 100%; max-width: 600px; padding: 40px 20px; display: flex; flex-direction: column; gap: 50px; }
        .benefit-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(0, 242, 255, 0.15); padding: 25px; border-radius: 8px; }
        .benefit-number { font-size: 1.8rem; font-weight: 900; color: #ff00ff; }
        .benefit-text h3 { color: #00f2ff; margin-bottom: 5px; }

        .form-container { width: 100%; background: #111; padding: 30px; border-radius: 12px; border: 1px solid #333; }
        .form-input { width: 100%; padding: 15px; background: #1a1a1a; border: 1px solid #333; color: #fff; margin-bottom: 15px; font-family: 'Orbitron'; }
        .btn-whatsapp { width: 100%; padding: 18px; background: linear-gradient(90deg, #00f2ff, #ff00ff); border: none; color: #fff; font-weight: 900; text-transform: uppercase; cursor: pointer; border-radius: 6px; }

        /* PROJETOS NO FINAL COM ANIMAÇÃO */
        .portfolio-final { width: 100%; max-width: 800px; padding: 80px 20px; text-align: center; z-index: 20; }
        .projects-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
        
        .project-item { 
            position: relative; border-radius: 12px; overflow: hidden; 
            border: 2px solid rgba(0, 242, 255, 0.2); aspect-ratio: 16/9; 
            opacity: 0; transform: translateY(30px); transition: 0.8s; cursor: pointer; 
        }
        
        .project-item.visible { opacity: 1; transform: translateY(0); }
        .project-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s; }
        .project-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.4s; }
        .project-overlay span { border: 1px solid #00f2ff; color: #00f2ff; padding: 10px 15px; font-size: 0.7rem; font-weight: 900; box-shadow: 0 0 10px #00f2ff; }
        
        .project-item:hover img { transform: scale(1.15); }
        .project-item:hover .project-overlay { opacity: 1; }

        footer { padding: 40px 0; color: rgba(255,255,255,0.3); font-size: 10px; text-align: center; letter-spacing: 2px; }

        #transition-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; opacity: 0; pointer-events: none; transition: 0.5s; }
    </style>
</head>
<body>
    <div class="grid"></div>
    <div id="transition-overlay"></div>
    <div class="background-elements" id="bg-elements"></div>

    <div class="container">
        <img src="https://i.imgur.com/kS5qJm9.png" class="diamond-img">
        <p class="name">Ivo Tadeu</p>
        <h1>CONSTRUINDO <br> O FUTURO</h1>
        
        <div class="btn-group">
            <button class="btn" onclick="document.getElementById('form-section').scrollIntoView({behavior: 'smooth'})">Quero um Site</button>
            <button class="btn" onclick="navegar('tech')">Sistema Tech</button>
            
            <div class="price-box-container" onclick="togglePrice()">
                <div class="exploding-box" id="box-element"></div>
                <div class="price-content" id="price-txt">
                    💻 Sites a partir de R$ 150 <br>
                    📈 Projetos personalizados
                </div>
                <div style="font-size: 8px; color: #00f2ff; margin-top: 10px; letter-spacing: 1px;" id="hint-txt">CLIQUE AQUI</div>
            </div>
        </div>
    </div>

    <div class="section-wrapper">
        <div class="benefit-card">
            <div class="benefit-number">01</div>
            <div class="benefit-text"><h3>Autoridade Digital</h3><p>Seu negócio com confiança instantânea e visual moderno.</p></div>
        </div>

        <div class="impact-section" id="form-section">
            <div class="form-container">
                <form onsubmit="chamarWhatsapp(event)">
                    <input type="text" id="nome_lead" class="form-input" placeholder="Seu Nome" required>
                    <input type="tel" id="whatsapp_lead" class="form-input" placeholder="Seu WhatsApp" required>
                    <button type="submit" class="btn-whatsapp">Chamar no WhatsApp agora</button>
                </form>
            </div>
        </div>
    </div>

    <div class="portfolio-final">
        <button class="btn" style="margin-bottom: 20px; cursor: default; animation: none;">Projetos que já desenvolvi</button>
        <div class="projects-grid">
            <div class="project-item">
                <img src="89ad273cfcabdeba8901292427310d93.jpg">
                <div class="project-overlay"><span>Ver Detalhes</span></div>
            </div>
            <div class="project-item">
                <img src="IMG_20260419_234142.jpg">
                <div class="project-overlay"><span>Ver Detalhes</span></div>
            </div>
            <div class="project-item">
                <img src="c2ebb795411eab761d324593fbcae3d3.jpg">
                <div class="project-overlay"><span>Ver Detalhes</span></div>
            </div>
        </div>
    </div>

    <footer>&copy; 2026 LOPES DIGITAL CO. // UBAÍ - MG</footer>

    <script>
        // FUNÇÃO DO BAÚ
        function togglePrice() {
            const box = document.getElementById('box-element');
            const txt = document.getElementById('price-txt');
            const hint = document.getElementById('hint-txt');
            if (txt.classList.contains('show')) {
                txt.classList.remove('show'); box.classList.remove('active'); hint.innerText = "CLIQUE AQUI";
            } else {
                txt.classList.add('show'); box.classList.add('active'); hint.innerText = "FECHAR";
            }
        }

        // NAVEGAÇÃO COM TRANSIÇÃO
        function navegar(destino) {
            const overlay = document.getElementById('transition-overlay');
            overlay.style.opacity = '1';
            overlay.style.pointerEvents = 'all';
            setTimeout(() => {
                if(destino === 'tech') window.location.href = "pages/tech.html";
            }, 500);
        }

        // WHATSAPP
        function chamarWhatsapp(event) {
            event.preventDefault();
            const nome = document.getElementById('nome_lead').value;
            window.open(`https://wa.me/5538997404945?text=Olá, meu nome é ${nome} e quero um orçamento!`, '_blank');
        }

        // ELEMENTOS VOANDO (ANIMAÇÕES RECUPERADAS)
        const icons = ['🏎️', '🚀', '⚡', '💻', '👾'];
        const bgContainer = document.getElementById('bg-elements');
        function createElements() {
            bgContainer.innerHTML = '';
            for (let i = 0; i < 15; i++) {
                const el = document.createElement('div');
                el.className = 'b-element';
                el.innerText = icons[Math.floor(Math.random() * icons.length)];
                el.style.setProperty('--sx', Math.random() * 100 + 'vw');
                el.style.setProperty('--sy', Math.random() * 100 + 'vh');
                el.style.setProperty('--ex', Math.random() * 100 + 'vw');
                el.style.setProperty('--ey', Math.random() * 100 + 'vh');
                el.style.animationDelay = Math.random() * 15 + 's';
                el.style.left = "0"; el.style.top = "0";
                bgContainer.appendChild(el);
            }
        }

        // OBSERVAR ROLAGEM PARA ANIMAR PROJETOS
        window.addEventListener('DOMContentLoaded', () => {
            createElements();
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if(entry.isIntersecting) entry.target.classList.add('visible');
                });
            }, { threshold: 0.1 });
            document.querySelectorAll('.project-item').forEach(el => observer.observe(el));

            // Auto-abrir baú em 2s
            setTimeout(() => {
                if (!document.getElementById('price-txt').classList.contains('show')) togglePrice();
            }, 2000);
        });
    </script>
</body>
</html>
