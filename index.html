<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lopes | Tech Vision</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background-color: #050505; color: #ffffff; font-family: 'Orbitron', sans-serif; height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center; overflow: hidden; position: fixed; }
        
        .grid { position: absolute; width: 200%; height: 200%; background-image: linear-gradient(rgba(0, 242, 255, 0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 242, 255, 0.1) 1px, transparent 1px); background-size: 40px 40px; transform: perspective(500px) rotateX(60deg); top: -50%; animation: move 10s linear infinite; z-index: 0; }
        @keyframes move { from { transform: perspective(500px) rotateX(60deg) translateY(0); } to { transform: perspective(500px) rotateX(60deg) translateY(40px); } }

        .container { position: relative; z-index: 10; text-align: center; padding: 20px; width: 100%; }
        .hacker-art { color: #00f2ff; font-family: monospace; font-size: 10px; white-space: pre; margin-bottom: 20px; text-shadow: 0 0 10px #00f2ff; }
        .name { font-size: 12px; letter-spacing: 5px; color: #00f2ff; margin-bottom: 15px; opacity: 0.8; }
        
        h1 { font-size: 2.5rem; font-weight: 900; margin-bottom: 40px; background: linear-gradient(90deg, #00f2ff 0%, #ff00ff 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 20px rgba(0, 242, 255, 0.3); line-height: 1.1; }
        
        .btn-group { display: flex; flex-direction: column; gap: 20px; align-items: center; }
        .btn { width: 85%; max-width: 300px; padding: 18px; background: rgba(0, 242, 255, 0.05); border: 2px solid #00f2ff; color: #00f2ff; font-family: 'Orbitron', sans-serif; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; cursor: pointer; outline: none; }
        .btn:active { background: #00f2ff; color: #000; transform: scale(0.95); }

        /* NOVO EFEITO: Overlay de Fade Cinematográfico */
        #transition-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease-in-out;
        }
    </style>
</head>
