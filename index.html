<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lopes | Tech Vision</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background-color: #020202; color: #ffffff; font-family: 'Orbitron', sans-serif; height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center; overflow: hidden; position: fixed; }
        
        .grid { position: absolute; width: 200%; height: 200%; background-image: linear-gradient(rgba(0, 242, 255, 0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 242, 255, 0.1) 1px, transparent 1px); background-size: 40px 40px; transform: perspective(500px) rotateX(60deg); top: -50%; animation: move 10s linear infinite; z-index: 0; }
        @keyframes move { from { transform: perspective(500px) rotateX(60deg) translateY(0); } to { transform: perspective(500px) rotateX(60deg) translateY(40px); } }

        .container { position: relative; z-index: 10; text-align: center; padding: 20px; width: 100%; transition: 0.1s; }
        .hacker-art { color: #00f2ff; font-family: monospace; font-size: 10px; white-space: pre; margin-bottom: 20px; text-shadow: 0 0 10px #00f2ff; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .name { font-size: 10px; letter-spacing: 5px; color: #00f2ff; margin-bottom: 15px; opacity: 0.8; }
        h1 { font-size: 2.2rem; font-weight: 900; margin-bottom: 40px; text-shadow: 0 0 20px rgba(0, 242, 255, 0.5); line-height: 1.1; }
        
        .btn-group { display: flex; flex-direction: column; gap: 20px; align-items: center; }
        .btn { width: 85%; max-width: 300px; padding: 18px; background: transparent; border: 1px solid #00f2ff; color: #00f2ff; font-family: 'Orbitron', sans-serif; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; transition: 0.2s; cursor: pointer; outline: none; }
        .btn:active { background: #00f2ff; color: #000; transform: scale(0.95); }

        /* NOVO EFEITO SCANNER */
        .scanner { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(0deg, rgba(0, 242, 255, 0.15), rgba(0, 242, 255, 0.15) 1px, transparent 1px, transparent 2px); z-index: 9999; display: none; pointer-events: none; }
        .glitch-effect { animation: glitch 0.2s infinite; }
        @keyframes glitch { 0% { transform: translate(2px, 0); text-shadow: 2px 0 #ff00ff, -2px 0 #00ffff; } 50% { transform: translate(-2px, 0); text-shadow: -2px 0 #ff00ff, 2px 0 #00ffff; } 100% { transform: translate(0); } }
    </style>
</head>
<body oncontextmenu="return false;">
    <div class="grid"></div>
    <div class="scanner" id="scanner"></div>
    <div class="container" id="main-ui">
        <div class="hacker-art">
    _  _ 
   ( \/ )
    \  / 
     \/  
  TECH_LEAD
        </div>
        <p class="name">IVO TADEU ALMEIDA LOPES</p>
        <h1>CONSTRUINDO <br> O FUTURO</h1>
        <div class="btn-group">
            <button class="btn" onclick="executar('whats')">Quero um Site</button>
            <button class="btn" onclick="executar('tech')">Sistema Tech</button>
        </div>
    </div>

    <script>
        function executar(destino) {
            const scan = document.getElementById('scanner');
            const ui = document.getElementById('main-ui');
            scan.style.display = 'block';
            ui.classList.add('glitch-effect');
            
            setTimeout(() => {
                if(destino === 'whats') {
                    window.location.href = "https://wa.me/5538997404945?text=oi%20quero%20um%20site";
                } else {
                    window.location.href = "pages/tech.html";
                }
            }, 700);
        }
    </script>
</body>
</html>
