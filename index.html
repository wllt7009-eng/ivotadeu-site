<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lopes | Tech Vision</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- ESTILOS ORIGINAIS (SEM MUDANÇA) --- */
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: radial-gradient(circle at center, #0a1a2f 0%, #020202 100%);
            color: #ffffff; 
            font-family: 'Orbitron', sans-serif; 
            height: 100vh; 
            width: 100vw; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
            position: fixed; 
        }
        
        .grid { 
            position: absolute; 
            width: 200%; 
            height: 200%; 
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.2) 1px, transparent 1px), 
                linear-gradient(90deg, rgba(0, 242, 255, 0.2) 1px, transparent 1px); 
            background-size: 40px 40px; 
            transform: perspective(500px) rotateX(60deg); 
            top: -50%; 
            animation: moveGrid 10s linear infinite; 
            z-index: 0; 
        }
        @keyframes moveGrid { from { transform: perspective(500px) rotateX(60deg) translateY(0); } to { transform: perspective(500px) rotateX(60deg) translateY(40px); } }

        .container { position: relative; z-index: 10; text-align: center; padding: 20px; width: 100%; transition: 0.1s; }
        
        .hacker-art { 
            color: #00f2ff; 
            font-family: monospace; 
            font-size: 10px; 
            white-space: pre; 
            margin-bottom: 20px; 
            text-shadow: 0 0 10px #00f2ff, 0 0 20px #ff00ff;
            animation: pulseHacker 2s infinite; 
        }
        @keyframes pulseHacker { 0%, 100% { opacity: 1; text-shadow: 0 0 10px #00f2ff, 0 0 20px #ff00ff; } 50% { opacity: 0.7; text-shadow: 0 0 5px #00f2ff, 0 0 10px #ff00ff; } }
        
        .name { font-size: 10px; letter-spacing: 5px; color: #ff00ff; margin-bottom: 15px; text-shadow: 0 0 5px #ff00ff; text-transform: uppercase; }
        
        h1 { 
            font-size: 2.2rem; 
            font-weight: 900; 
            margin-bottom: 40px; 
            background: linear-gradient(90deg, #00f2ff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.5); 
            line-height: 1.1; 
        }
        
        .btn-group { display: flex; flex-direction: column; gap: 20px; align-items: center; }
        
        .btn { 
            width: 85%; 
            max-width: 300px; 
            padding: 18px; 
            background: rgba(0, 242, 255, 0.05); 
            border: 2px solid #00f2ff; 
            color: #00f2ff; 
            font-family: 'Orbitron', sans-serif; 
            font-weight: 900; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            transition: 0.3s; 
            cursor: pointer; 
            outline: none; 
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.3);
        }
        
        .btn-tech {
            border-color: #ff00ff;
            color: #ff00ff;
            background: rgba(255, 0, 255, 0.05);
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.3);
        }

        .btn:active { background: #00f2ff; color: #000; transform: scale(0.95); box-shadow: 0 0 30px #00f2ff; }
        .btn-tech:active { background: #ff00ff; color: #000; box-shadow: 0 0 30px #ff00ff; }

        .scanner { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: repeating-linear-gradient(0deg, rgba(0, 242, 255, 0.2), rgba(0, 242, 255, 0.2) 1px, transparent 1px, transparent 2px); 
            z-index: 9999; 
            display: none; 
            pointer-events: none; 
        }
        
        .glitch-effect { animation: glitchScanner 0.2s infinite; }
        @keyframes glitchScanner { 
            0% { transform: translate(2px, 0); text-shadow: 4px 0 #ff00ff, -4px 0 #00ffff; } 
            50% { transform: translate(-2px, 0); text-shadow: -4px 0 #ff00ff, 4px 0 #00ffff; } 
            100% { transform: translate(0); text-shadow: 0 0 15px rgba(0, 242, 255, 0.5); } 
        }

        /* --- NOVOS ESTILOS PARA ANIMAÇÕES DE FUNDO --- */
        
        /* Container para segurar os elementos de fundo */
        .background-elements {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Não interfere nos cliques */
            z-index: 1; /* Atrás do container principal (z-index 10) */
        }
        
        /* Classe base para cada elemento de fundo */
        .b-element {
            position: absolute;
            color: rgba(255, 255, 255, 0.15); /* Branco bem transparente */
            font-size: 30px; /* Tamanho base */
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.1), 0 0 15px rgba(255, 0, 255, 0.1); /* Brilho suave */
            opacity: 0; /* Começa invisível */
            animation: floatElement 15s linear infinite, fadeInOutElement 15s linear infinite;
        }

        /* Animação para flutuar e mover */
        @keyframes floatElement {
            0% { transform: translate(var(--start-x), var(--start-y)) rotate(0deg); opacity: 0; }
            10% { opacity: var(--max-opacity); } /* Aparece rápido */
            50% { transform: translate(var(--mid-x), var(--mid-y)) rotate(var(--mid-rotate)); }
            90% { opacity: var(--max-opacity); } /* Fica visível */
            100% { transform: translate(var(--end-x), var(--end-y)) rotate(var(--end-rotate)); opacity: 0; } /* Desaparece */
        }

        /* Animação para fadeIn/fadeOut (garante que não "pisque" ao reaparecer) */
        @keyframes fadeInOutElement {
            0%, 100% { opacity: 0; }
            10%, 90% { opacity: var(--max-opacity); }
        }
    </style>
</head>
<body oncontextmenu="return false;">
    <div class="grid"></div>
    <div class="scanner" id="scanner"></div>

    <div class="background-elements" id="background-elements">
        </div>

    <div class="container" id="main-ui">
        <div class="hacker-art">
    _  _ 
   ( \/ )
    \  / 
     \/  
  TECH_LEAD
        </div>
        <p class="name">IVO TADEU ALMEIDA LOPES</p>
        <h1>CONSTRUINDO <br> O FUTURO</h1>
        <div class="btn-group">
            <button class="btn" onclick="executar('whats')">Quero um Site</button>
            <button class="btn" onclick="executar('tech')">Sistema Tech</button>
        </div>
    </div>

    <script>
        // --- SCRIPT ORIGINAL (SEM MUDANÇA) ---
        function executar(destino) {
            const scan = document.getElementById('scanner');
            const ui = document.getElementById('main-ui');
            
            // Muda a cor do scanner baseada no destino
            if (destino === 'tech') {
                scan.style.background = 'repeating-linear-gradient(0deg, rgba(255, 0, 255, 0.2), rgba(255, 0, 255, 0.2) 1px, transparent 1px, transparent 2px)';
            } else {
                scan.style.background = 'repeating-linear-gradient(0deg, rgba(0, 242, 255, 0.2), rgba(0, 242, 255, 0.2) 1px, transparent 1px, transparent 2px)';
            }
            
            scan.style.display = 'block';
            ui.classList.add('glitch-effect');
            
            setTimeout(() => {
                if(destino === 'whats') {
                    window.location.href = "https://wa.me/5538997404945?text=oi%20quero%20um%20site";
                } else {
                    window.location.href = "pages/tech.html";
                }
            }, 700);
        }

        // --- NOVO SCRIPT PARA GERAR ELEMENTOS DE FUNDO ---
        const backgroundElementsContainer = document.getElementById('background-elements');
        const elementList = [
            '🏎️', '🍄', '🍌', '⭐', '🐢', '🛸', '👾', '🚀', '💀', '🔥', '⚡', '💻', '📡' // Lista de ícones Mario Kart + Tech
        ];
        const numElements = 20; // Quantidade de elementos na tela

        function createBackgroundElement() {
            const element = document.createElement('div');
            element.classList.add('b-element');
            
            // Sorteia um ícone da lista
            const randomIcon = elementList[Math.floor(Math.random() * elementList.length)];
            element.innerText = randomIcon;
            
            // Define propriedades CSS variáveis para animação aleatória
            element.style.setProperty('--start-x', `${Math.random() * 100}vw`);
            element.style.setProperty('--start-y', `${Math.random() * 100}vh`);
            element.style.setProperty('--mid-x', `${Math.random() * 100}vw`);
            element.style.setProperty('--mid-y', `${Math.random() * 100}vh`);
            element.style.setProperty('--end-x', `${Math.random() * 100}vw`);
            element.style.setProperty('--end-y', `${Math.random() * 100}vh`);
            element.style.setProperty('--mid-rotate', `${(Math.random() - 0.5) * 360}deg`);
            element.style.setProperty('--end-rotate', `${(Math.random() - 0.5) * 360}deg`);
            element.style.setProperty('--max-opacity', (Math.random() * 0.2 + 0.1)); // Transparência aleatória sutil
            
            // Duração e delay aleatórios para não parecer tudo igual
            element.style.animationDuration = `${Math.random() * 10 + 10}s`; // 10 a 20 segundos
            element.style.animationDelay = `-${Math.random() * 20}s`; // Começa em tempos diferentes

            backgroundElementsContainer.appendChild(element);
        }

        // Cria os elementos iniciais
        for (let i = 0; i < numElements; i++) {
            createBackgroundElement();
        }
    </script>
</body>
</html>
