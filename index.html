<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lopes | Tech Vision</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon: #00f2ff;
            --dark-bg: #020202;
            --glass: rgba(0, 242, 255, 0.05);
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* Fundo Tecnológico de Linhas */
        .grid-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(var(--glass) 1px, transparent 1px), 
                              linear-gradient(90deg, var(--glass) 1px, transparent 1px);
            background-size: 50px 50px;
            background-position: center;
            perspective: 1000px;
            animation: gridMove 10s linear infinite;
            z-index: -1;
        }

        @keyframes gridMove {
            from { transform: rotateX(45deg) translateY(0); }
            to { transform: rotateX(45deg) translateY(50px); }
        }

        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            background: radial-gradient(circle, rgba(0,242,255,0.05) 0%, transparent 70%);
        }

        /* Caveira Hacker Melhorada */
        .hacker-icon {
            color: var(--neon);
            font-family: 'Share Tech Mono', monospace;
            font-size: 14px;
            line-height: 12px;
            white-space: pre;
            margin-bottom: 30px;
            text-shadow: 0 0 15px var(--neon);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.95); }
        }

        .name-tag {
            font-size: 0.9rem;
            letter-spacing: 8px;
            color: #888;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        /* Título com Efeito Glitch Surreal */
        .glitch-title {
            font-size: 4rem;
            font-weight: 900;
            text-transform: uppercase;
            position: relative;
            color: white;
            text-shadow: 0 0 20px rgba(0, 242, 255, 0.5);
            margin: 0;
        }

        .glitch-title::before, .glitch-title::after {
            content: "CONSTRUINDO O FUTURO";
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.8;
        }

        .glitch-title:hover::before {
            color: #ff00ff;
            z-index: -1;
            animation: glitch 0.3s cubic-bezier(.25,.46,.45,.94) both infinite;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-3px, 3px); }
            40% { transform: translate(-3px, -3px); }
            60% { transform: translate(3px, 3px); }
            80% { transform: translate(3px, -3px); }
            100% { transform: translate(0); }
        }

        /* Botões Estilo Cyberpunk */
        .btn-box {
            display: flex;
            gap: 25px;
            margin-top: 50px;
        }

        .btn-cyber {
            position: relative;
            padding: 20px 40px;
            background: transparent;
            border: 1px solid var(--neon);
            color: var(--neon);
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            letter-spacing: 2px;
            text-decoration: none;
            text-transform: uppercase;
            overflow: hidden;
            transition: 0.5s;
            cursor: pointer;
        }

        .btn-cyber:hover {
            background: var(--neon);
            color: black;
            box-shadow: 0 0 50px var(--neon);
        }

        /* Portal e Bug */
        .portal-fx {
            position: fixed; top: 50%; left: 50%; width: 0; height: 0;
            background: var(--neon); border-radius: 50%;
            transform: translate(-50%, -50%); z-index: 9999;
            transition: 1s cubic-bezier(0.7, 0, 0.3, 1);
            pointer-events: none;
        }
