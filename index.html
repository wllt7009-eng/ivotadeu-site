<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lopes Digital Co. | Tech Vision</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        /* FUNDO PRETO TOTAL */
        html, body {
            background-color: #000 !important;
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body { 
            color: #ffffff; 
            font-family: 'Orbitron', sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            position: fixed; 
        }
        
        /* GRADE COM PROFUNDIDADE (STYLE TRON) */
        .grid { 
            position: absolute; 
            width: 400%; 
            height: 400%; 
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.2) 1px, transparent 1px), 
                linear-gradient(90deg, rgba(0, 242, 255, 0.2) 1px, transparent 1px); 
            background-size: 60px 60px; 
            transform: perspective(500px) rotateX(75deg); 
            top: -120%; 
            animation: moveGrid 12s linear infinite; 
            z-index: 0;
            mask-image: linear-gradient(to top, rgba(0,0,0,1) 15%, rgba(0,0,0,0) 70%);
            -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,1) 15%, rgba(0,0,0,0) 70%);
        }

        @keyframes moveGrid { 
            from { transform: perspective(500px) rotateX(75deg) translateY(0); } 
            to { transform: perspective(500px) rotateX(75deg) translateY(60px); } 
        }

        /* POSICIONAMENTO: BEM MAIS PARA CIMA */
        .container { 
            position: relative; 
            z-index: 10; 
            text-align: center; 
            padding: 20px; 
            width: 100%; 
            top: -100px; /* ELEVADO PARA O TOPO */
        }
        
        .hacker-art { 
            color: #00f2ff; 
            font-family: monospace; 
            font-size: 10px; 
            white-space: pre; 
            margin-bottom: 20px; 
            text-shadow: 0 0 10px #00f2ff;
        }
        
        .name { 
            font-size: 14px; 
            letter-spacing: 6px; 
            color: #ff00ff; 
            margin-bottom: 10px; 
            text-shadow: 0 0 8px #ff00ff; 
            font-weight: 900;
            text-transform: uppercase;
        }
        
        h1 { 
            font-size: 2.2rem; 
            font-weight: 900; 
            margin-bottom: 40px; 
            background: linear-gradient(90deg, #00f2ff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.1; 
        }
        
        .btn-group { display: flex; flex-direction: column; gap: 20px; align-items: center; }
        
        .btn { 
            width: 85%; 
            max-width: 300px; 
            padding: 18px; 
            background: rgba(0, 0, 0, 0.8); 
            border: 2px solid #00f2ff; 
            color: #00f2ff; 
            font-family: 'Orbitron', sans-serif; 
            font-weight: 900; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            transition: 0.3s; 
            cursor: pointer; 
        }
        
        .btn:active { background: #00f2ff; color: #000; transform: scale(0.95); }

        .background-elements {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        
        .b-element {
            position: absolute;
            font-size: 24px;
            opacity: 0;
            animation: floatElement 15s linear infinite;
        }

        @keyframes floatElement {
            0% { transform: translate(var(--sx), var(--sy)) rotate(0deg); opacity: 0; }
            20% { opacity: 0.3; }
            80% { opacity: 0.3; }
            100% { transform: translate(var(--ex), var(--ey)) rotate(360deg); opacity: 0; }
        }

        #transition-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 0.5s;
        }
    </style>
</head>
