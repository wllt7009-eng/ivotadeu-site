<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lopes Digital Co. | Tech Vision</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        html, body {
            background-color: #000 !important;
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            overflow: hidden;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body { 
            color: #ffffff; 
            font-family: 'Orbitron', sans-serif; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: flex-start; 
            padding-top: 8vh; 
            position: fixed; 
        }
        
        /* GRADE TRON */
        .grid { 
            position: absolute; 
            width: 400%; height: 400%; 
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.2) 1px, transparent 1px), 
                linear-gradient(90deg, rgba(0, 242, 255, 0.2) 1px, transparent 1px); 
            background-size: 60px 60px; 
            transform: perspective(500px) rotateX(75deg); 
            top: -120%; 
            animation: moveGrid 12s linear infinite; 
            z-index: 1;
            mask-image: linear-gradient(to top, rgba(0,0,0,1) 15%, rgba(0,0,0,0) 70%);
            -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,1) 15%, rgba(0,0,0,0) 70%);
            pointer-events: none;
        }

        @keyframes moveGrid { 
            from { transform: perspective(500px) rotateX(75deg) translateY(0); } 
            to { transform: perspective(500px) rotateX(75deg) translateY(60px); } 
        }

        .container { position: relative; z-index: 100; text-align: center; padding: 20px; width: 100%; }
        
        .diamond-img {
            display: block;
            margin: 0 auto 15px;
            width: 55px;
            height: auto;
            filter: drop-shadow(0 0 10px #00f2ff);
        }

        /* REFERÊNCIA STUDIO SITE: TAG DE CATEGORIA */
        .category-tag {
            font-size: 10px;
            color: #00f2ff;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 5px;
            opacity: 0.8;
        }
        
        .name { 
            font-size: 16px; 
            letter-spacing: 6px; 
            color: #ff00ff; 
            margin-bottom: 10px; 
            text-shadow: 0 0 8px #ff00ff; 
            font-weight: 900;
            text-transform: uppercase;
        }
        
        h1 { 
            font-size: 2.2rem; 
            font-weight: 900; 
            margin-bottom: 40px; 
            background: linear-gradient(90deg, #00f2ff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.1; 
        }
        
        .btn-group { display: flex; flex-direction: column; gap: 20px; align-items: center; }
        
        .btn { 
            width: 85%; max-width: 300px; padding: 18px; 
            background: rgba(0, 0, 0, 0.85); border: 2px solid #00f2ff; 
            color: #00f2ff; font-family: 'Orbitron', sans-serif; font-weight: 900; 
            text-transform: uppercase; letter-spacing: 2px; cursor: pointer; 
            transition: all 0.3s ease; box-shadow: 0 0 5px rgba(0, 242, 255, 0.2);
            animation: pulseGlow 3s infinite;
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 5px rgba(0, 242, 255, 0.2); }
            50% { box-shadow: 0 0 15px rgba(0, 242, 255, 0.5); border-color: #ffffff; }
            100% { box-shadow: 0 0 5px rgba(0, 242, 255, 0.2); }
        }
        
        .btn:active { transform: scale(0.92); background: #00f2ff; color: #000; box-shadow: 0 0 30px #00f2ff; }

        /* REFERÊNCIA STUDIO SITE: RODAPÉ MINIMALISTA */
        footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 9px;
            color: rgba(255,255,255,0.4);
            letter-spacing: 2px;
            z-index: 100;
        }

        .background-elements { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2; }
        .b-element { position: absolute; font-size: 24px; opacity: 0; animation: floatElement 15s linear infinite; }

        @keyframes floatElement {
            0% { transform: translate(var(--sx), var(--sy)) rotate(0deg); opacity: 0; }
            20% { opacity: 0.3; }
            80% { opacity: 0.3; }
            100% { transform: translate(var(--ex), var(--ey)) rotate(360deg); opacity: 0; }
        }

        #transition-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 0.5s; }
    </style>
</head>
<body oncontextmenu="return false;">
    <div class="grid"></div>
    <div id="transition-overlay"></div>
    <div class="background-elements" id="bg-elements"></div>

    <div class="container">
        <img src="https://i.imgur.com/kS5qJm9.png" alt="Diamond" class="diamond-img">
        <p class="category-tag">Creative Digital Agency</p>
        <p class="name">Lopes Digital Co.</p>
        <h1>CONSTRUINDO <br> O FUTURO</h1>
        
        <div class="btn-group">
            <button class="btn" onclick="navegar('whats')">Quero um Site</button>
            <button class="btn" onclick="navegar('tech')">Sistema Tech</button>
        </div>
    </div>

    <footer>
        &copy; 2026 LOPES DIGITAL CO. // UBAÍ - MG
    </footer>

    <script>
        function navegar(destino) {
            const overlay = document.getElementById('transition-overlay');
            overlay.style.opacity = '1';
            overlay.style.pointerEvents = 'all';
            setTimeout(() => {
                if(destino === 'whats') {
                    window.location.href = "https://wa.me/5538997404945?text=oi%20quero%20um%20site";
                } else {
                    window.location.href = "pages/tech.html";
                }
            }, 500);
        }

        const icons = ['🏎️', '🍄', '🍌', '⭐', '🐢', '🛸', '👾', '🚀', '⚡', '💻'];
        const container = document.getElementById('bg-elements');

        function createElements() {
            container.innerHTML = '';
            for (let i = 0; i < 12; i++) {
                const el = document.createElement('div');
                el.className = 'b-element';
                el.innerText = icons[Math.floor(Math.random() * icons.length)];
                el.style.setProperty('--sx', Math.random() * 100 + 'vw');
                el.style.setProperty('--sy', Math.random() * 100 + 'vh');
                el.style.setProperty('--ex', Math.random() * 100 + 'vw');
                el.style.setProperty('--ey', Math.random() * 100 + 'vh');
                el.style.animationDelay = Math.random() * 15 + 's';
                el.style.left = "0"; el.style.top = "0";
                container.appendChild(el);
            }
        }

        createElements();

        window.onpageshow = function(event) {
            const overlay = document.getElementById('transition-overlay');
            if(overlay) {
                overlay.style.opacity = '0';
                overlay.style.pointerEvents = 'none';
            }
        };
    </script>
</body>
</html>
