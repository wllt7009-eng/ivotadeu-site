<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lopes Digital Co. | Tech Vision</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        /* FUNDO PRETO TOTAL */
        html, body {
            background-color: #000 !important;
            margin: 0; padding: 0;
            width: 100vw;
            min-height: 100vh;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body { 
            color: #ffffff; 
            font-family: 'Orbitron', sans-serif; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: flex-start;
            position: relative;
        }
        
        .grid { 
            position: fixed; 
            width: 400%; height: 200vh; 
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.15) 1px, transparent 1px), 
                linear-gradient(90deg, rgba(0, 242, 255, 0.15) 1px, transparent 1px); 
            background-size: 60px 60px; 
            transform: perspective(500px) rotateX(75deg); 
            top: -50%; 
            animation: moveGrid 15s linear infinite; 
            z-index: 1;
            mask-image: linear-gradient(to top, rgba(0,0,0,1) 30%, rgba(0,0,0,0) 80%);
            -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,1) 30%, rgba(0,0,0,0) 80%);
            pointer-events: none;
        }

        @keyframes moveGrid { 
            from { transform: perspective(500px) rotateX(75deg) translateY(0); } 
            to { transform: perspective(500px) rotateX(75deg) translateY(60px); } 
        }

        .container { 
            position: relative; 
            z-index: 10; 
            text-align: center; 
            padding: 8vh 20px 60px; 
            width: 100%; 
            min-height: 80vh; 
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
        }
        
        .diamond-img {
            display: block;
            margin: 0 auto 20px;
            width: 60px;
            height: auto;
            filter: drop-shadow(0 0 10px #00f2ff);
        }
        
        .name { 
            font-size: 14px; 
            letter-spacing: 6px; 
            color: #fff; 
            margin-bottom: 10px; 
            text-shadow: 0 0 8px #00f2ff; 
            font-weight: 900;
            text-transform: uppercase;
        }
        
        h1 { 
            font-size: 2.2rem; 
            font-weight: 900; 
            margin-bottom: 40px; 
            background: linear-gradient(90deg, #00f2ff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.1; 
        }
        
        .btn-group { display: flex; flex-direction: column; gap: 20px; align-items: center; width: 100%; }
        
        .btn { 
            width: 85%; 
            max-width: 300px; 
            padding: 18px; 
            background: rgba(0, 0, 0, 0.85); 
            border: 2px solid #00f2ff; 
            color: #00f2ff; 
            font-family: 'Orbitron', sans-serif; 
            font-weight: 900; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            transition: 0.3s; 
            cursor: pointer; 
            position: relative;
            animation: pulseGlow 3s infinite;
        }
        
        @keyframes pulseGlow {
            0% { box-shadow: 0 0 5px rgba(0, 242, 255, 0.2); }
            50% { box-shadow: 0 0 15px rgba(0, 242, 255, 0.5); border-color: #ffffff; }
            100% { box-shadow: 0 0 5px rgba(0, 242, 255, 0.2); }
        }
        
        .btn:active { background: #00f2ff; color: #000; transform: scale(0.95); }

        .price-box-container {
            margin-top: 20px;
            position: relative;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .exploding-box {
            position: absolute;
            width: 18px; height: 18px; 
            background-image: url('d13f5683bc7fe962cdcd0bd925ac50aa.jpg'); 
            background-size: cover;
            background-position: center;
            box-shadow: 0 0 20px #00f2ff;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 2px;
            z-index: 1;
        }

        .exploding-box.active {
            transform: scale(6); 
            opacity: 0;
            filter: blur(4px);
        }

        .price-content {
            opacity: 0;
            transform: scale(0.8);
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            color: #00f2ff;
            font-size: 0.80rem;
            font-weight: 900;
            line-height: 1.6;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.4);
            text-align: center;
            z-index: 2;
        }

        .price-content.show {
            opacity: 1;
            transform: scale(1);
        }

        .click-hint {
            font-size: 8px;
            font-family: 'Orbitron', sans-serif;
            color: #00f2ff;
            margin-top: 10px;
            letter-spacing: 1.5px;
            transition: 0.3s;
            animation: bounceIn 1.5s infinite alternate;
            text-shadow: 0 0 5px #00f2ff;
            text-transform: uppercase;
        }

        @keyframes bounceIn {
            0% { opacity: 0.3; transform: translateY(0); }
            100% { opacity: 1; transform: translateY(-3px); }
        }

        .section-wrapper {
            position: relative;
            z-index: 20;
            width: 100%;
            max-width: 600px;
            padding: 60px 20px;
            display: flex; flex-direction: column; align-items: center; gap: 60px;
        }

        .step-intro {
            text-align: left;
            width: 100%;
            margin-bottom: -20px;
        }
        .step-intro h2 { font-size: 1.5rem; color: #fff; margin-bottom: 15px; }
        .step-intro p { font-family: sans-serif; color: #aaa; font-size: 0.9rem; line-height: 1.6; }
