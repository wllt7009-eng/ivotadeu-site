        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }

            font-family: 'Orbitron', sans-serif;

            align-items: center; 
            justify-content: flex-start; 
            padding-top: 10vh; 
            position: fixed; 
        }
        
        /* GRADE TRON */
        .grid { 
            position: absolute; 
            width: 400%; height: 400%; 
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.2) 1px, transparent 1px), 
                linear-gradient(90deg, rgba(0, 242, 255, 0.2) 1px, transparent 1px); 
            background-size: 60px 60px; 
            transform: perspective(500px) rotateX(75deg); 
            top: -120%; 
            animation: moveGrid 12s linear infinite; 
            z-index: 1;
            mask-image: linear-gradient(to top, rgba(0,0,0,1) 15%, rgba(0,0,0,0) 70%);
            -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,1) 15%, rgba(0,0,0,0) 70%);
            pointer-events: none;
        }

        @keyframes moveGrid { 
            from { transform: perspective(500px) rotateX(75deg) translateY(0); } 
            to { transform: perspective(500px) rotateX(75deg) translateY(60px); } 
        }
