<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lopes Digital Co. | Tech Vision</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        html, body {
            background-color: #000 !important;
            margin: 0; padding: 0;
            width: 100vw;
            min-height: 100vh;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body { 
            color: #ffffff; 
            font-family: 'Orbitron', sans-serif; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: flex-start;
            position: relative;
        }
        
        .grid { 
            position: fixed; 
            width: 400%; height: 200vh; 
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.15) 1px, transparent 1px), 
                linear-gradient(90deg, rgba(0, 242, 255, 0.15) 1px, transparent 1px); 
            background-size: 60px 60px; 
            transform: perspective(500px) rotateX(75deg); 
            top: -50%; 
            animation: moveGrid 15s linear infinite; 
            z-index: 1;
            mask-image: linear-gradient(to top, rgba(0,0,0,1) 30%, rgba(0,0,0,0) 80%);
            -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,1) 30%, rgba(0,0,0,0) 80%);
            pointer-events: none;
        }

        @keyframes moveGrid { 
            from { transform: perspective(500px) rotateX(75deg) translateY(0); } 
            to { transform: perspective(500px) rotateX(75deg) translateY(60px); } 
        }

        .container { 
            position: relative; 
            z-index: 10; 
            text-align: center; 
            padding: 8vh 20px 60px; 
            width: 100%; 
            min-height: 80vh; 
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
        }
        
        .diamond-img {
            display: block;
            margin: 0 auto 20px;
            width: 60px;
            height: auto;
            filter: drop-shadow(0 0 10px #00f2ff);
        }
        
        .name { 
            font-size: 14px; 
            letter-spacing: 6px; 
            color: #ff00ff; 
            margin-bottom: 10px; 
            text-shadow: 0 0 8px #ff00ff; 
            font-weight: 900;
            text-transform: uppercase;
        }
        
        h1 { 
            font-size: 2.2rem; 
            font-weight: 900; 
            margin-bottom: 40px; 
            background: linear-gradient(90deg, #00f2ff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.1; 
        }
        
        .btn-group { display: flex; flex-direction: column; gap: 20px; align-items: center; width: 100%; }
        
        .btn { 
            width: 85%; 
            max-width: 300px; 
            padding: 18px; 
            background: rgba(0, 0, 0, 0.85); 
            border: 2px solid #00f2ff; 
            color: #00f2ff; 
            font-family: 'Orbitron', sans-serif; 
            font-weight: 900; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            transition: 0.3s; 
            cursor: pointer; 
            position: relative;
            animation: pulseGlow 3s infinite;
        }
        
        @keyframes pulseGlow {
            0% { box-shadow: 0 0 5px rgba(0, 242, 255, 0.2); }
            50% { box-shadow: 0 0 15px rgba(0, 242, 255, 0.5); border-color: #ffffff; }
            100% { box-shadow: 0 0 5px rgba(0, 242, 255, 0.2); }
        }
        
        .section-wrapper {
            position: relative;
            z-index: 20;
            width: 100%;
            max-width: 600px;
            padding: 60px 20px;
            display: flex; flex-direction: column; align-items: center; gap: 60px;
        }

        .benefit-card { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(0, 242, 255, 0.15); 
            padding: 30px; border-radius: 8px; 
            text-align: left; margin-bottom: 20px;
            display: flex; align-items: flex-start; gap: 20px;
        }
        
        .benefit-number { font-size: 3rem; font-weight: 900; color: rgba(255, 0, 255, 0.3); }
        .benefit-text h3 { color: #00f2ff; text-transform: uppercase; margin-bottom: 10px; font-size: 1rem; }
        .benefit-text p { font-size: 0.85rem; color: #ccc; font-family: sans-serif; line-height: 1.6; }

        .form-container { 
            width: 90%; max-width: 380px; 
            background: #111; border: 1px solid #333; 
            padding: 30px; border-radius: 12px; 
            margin-top: 40px;
        }

        .form-input { 
            width: 100%; padding: 15px; margin-bottom: 15px;
            background: #1a1a1a; border: 1px solid #333; 
            color: #fff; font-family: 'Orbitron', sans-serif;
            border-radius: 6px;
        }

        .btn-whatsapp { 
            width: 100%; padding: 18px; 
            background: linear-gradient(90deg, #00f2ff, #ff00ff);
            border: none; color: #fff; font-weight: 900;
            text-transform: uppercase; border-radius: 6px; 
            cursor: pointer;
        }

        footer { padding: 30px; font-size: 10px; color: #444; letter-spacing: 2px; }

        #transition-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; opacity: 0; pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="grid"></div>
    <div id="transition-overlay"></div>

    <div class="container">
        <img src="https://i.imgur.com/kS5qJm9.png" alt="Logo" class="diamond-img">
        <p class="name">Lopes Digital Co.</p>
        <h1>CONSTRUINDO <br> O FUTURO</h1>
        <div class="btn-group">
            <a href="#form-section" style="width:100%; display:flex; justify-content:center; text-decoration:none;">
                <button class="btn">Quero um Site</button>
            </a>
        </div>
    </div>

    <div class="section-wrapper">
        <div class="benefit-card">
            <div class="benefit-number">01</div>
            <div class="benefit-text">
                <h3>Design Premium</h3>
                <p>Criamos vitrines impossíveis de ignorar.</p>
            </div>
        </div>

        <div id="form-section" class="form-container">
            <form onsubmit="chamarWhatsapp(event)">
                <input type="text" id="nome_lead" class="form-input" placeholder="Seu Nome" required>
                <input type="tel" id="whatsapp_lead" class="form-input" placeholder="Seu WhatsApp" required>
                <input type="email" id="email_lead" class="form-input" placeholder="Seu E-mail">
                <button type="submit" class="btn-whatsapp">Chamar no WhatsApp</button>
            </form>
        </div>
    </div>

    <footer>&copy; 2026 LOPES DIGITAL CO. // UBAÍ - MG</footer>

    <script>
        async function chamarWhatsapp(event) {
            event.preventDefault();
            
            const nome = document.getElementById('nome_lead').value;
            const zap = document.getElementById('whatsapp_lead').value;
            const email = document.getElementById('email_lead').value;
            
            const LINK_DO_SHEETBEST = "https://api.sheetbest.com/sheets/2f39b228-9d1f-45e0-8dff-c34c14c99763";

            try {
                fetch(LINK_DO_SHEETBEST, {
                    method: "POST",
                    mode: "cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        "Nome": nome, 
                        "WhatsApp": zap, 
                        "Email": email,
                        "Data": new Date().toLocaleString() 
                    })
                });
            } catch (e) { console.log(e); }

            const mensagem = `Olá, meu nome é ${nome} e quero um orçamento!`;
            window.open(`https://wa.me/5538997404945?text=${encodeURIComponent(mensagem)}`, '_blank');
        }
    </script>
</body>
</html>
