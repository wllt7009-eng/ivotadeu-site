<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lopes | Tech Vision</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            user-select: none; 
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #020202;
            color: #ffffff;
            font-family: 'Orbitron', sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; 
            position: fixed; 
        }

        .grid {
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
            transform: perspective(500px) rotateX(60deg);
            top: -50%;
            animation: move 10s linear infinite;
            z-index: 0;
        }

        @keyframes move {
            from { transform: perspective(500px) rotateX(60deg) translateY(0); }
            to { transform: perspective(500px) rotateX(60deg) translateY(40px); }
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 20px;
            width: 100%;
        }

        .hacker-art {
            color: #00f2ff;
            font-family: monospace;
            font-size: 10px;
            white-space: pre;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #00f2ff;
        }

        .name {
            font-size: 12px;
            letter-spacing: 5px;
            color: #00f2ff;
            margin-bottom: 15px;
            opacity: 0.8;
        }

        h1 {
            font-size: 2.5rem; 
            font-weight: 900;
            margin-bottom: 40px;
            text-shadow: 0 0 20px rgba(0, 242, 255, 0.5);
            line-height: 1.1;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .btn {
            width: 85%; 
            max-width: 300px;
            padding: 18px;
            background: transparent;
            border: 2px solid #00f2ff;
            color: #00f2ff;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            text-transform: uppercase;
            text-decoration: none;
            letter-spacing: 2px;
            transition: all 0.2s ease;
            cursor: pointer;
            outline: none;
            position: relative;
            z-index: 11;
        }

        .btn:active {
            transform: scale(0.95);
            background: rgba(0, 242, 255, 0.2);
        }

        /* CORREÇÃO DO PORTAL: Mais rápido e suave */
        .portal {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: #00f2ff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 9999;
            pointer-events: none;
            /* Curva de animação ajustada para ser explosiva */
            transition: width 0.6s cubic-bezier(0.9, 0, 0.1, 1), 
                        height 0.6s cubic-bezier(0.9, 0, 0.1, 1);
            will-change: width, height;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="grid"></div>
    <div class="portal" id="portal"></div>

    <div class="container">
        <div class="hacker-art">
     _  _
    ( \/ )
     \  /
      \/
   LOPES.DEV
        </div>

        <p class="name">IVO TADEU ALMEIDA LOPES</p>
        <h1>CONSTRUINDO <br> O FUTURO</h1>

        <div class="btn-group">
            <button class="btn" onclick="transicao('whats')">Quero um Site</button>
            <button class="btn" onclick="transicao('tech')">Sistema Tech</button>
        </div>
    </div>

    <script>
        function transicao(destino) {
            const p = document.getElementById('portal');
            
            // Ativa o portal instantaneamente
            p.style.width = '400vw';
            p.style.height = '400vw';
            
            // Tempo reduzido para 600ms para a troca ser mais "limpa" e sem delay
            setTimeout(() => {
                if(destino === 'whats') {
                    window.location.href = "https://wa.me/5538997404945?text=oi%20quero%20um%20site";
                } else {
                    window.location.href = "pages/tech.html";
                }
            }, 600);
        }
    </script>
</body>
</html>
